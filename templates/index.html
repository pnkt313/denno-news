<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>電脳新聞 縦書き電子版</title>
    <style>
        html { font-size: 50%; }
        body { 
            background-color: #f0ede4; 
            color: #222; 
            font-family: "Yu Mincho", "MS PMincho", serif; 
            margin: 0; padding: 0; 
            writing-mode: vertical-rl; 
            height: 100vh; 
            display: flex; flex-direction: row; 
        }

        /* ヘッダー・タブ */
        nav {
            writing-mode: horizontal-tb; 
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: #333; display: flex; align-items: center;
            padding: 0 20px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        nav .brand { color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 0.2rem; margin-right: 30px; }
        nav .menu { display: flex; justify-content: center; gap: 1px; flex-grow: 1; }
        nav .menu a { text-decoration: none; color: #eee; font-size: 1.6rem; padding: 12px 20px; background-color: #444; }
        nav .menu a.active { background-color: #a00; color: #fff; font-weight: bold; }

        /* 紙面レイアウト */
        main { 
            display: grid; 
            grid-template-rows: repeat(3, 1fr); 
            grid-auto-flow: column; 
            gap: 35px; /* 記事の間隔を少し広げて優雅に */
            padding: 80px 30px 30px 30px; 
            height: 100vh; box-sizing: border-box;
            overflow-x: auto;
            border-right: 1px solid #ccc;
        }
        
        article { 
            height: 380px; /* 一行を少し長く（約22-25文字） */
            width: auto; 
            min-width: 300px; 
            border-left: 1px solid #999; 
            padding-left: 20px; 
            display: flex; flex-direction: column; position: relative; 
        }

        /* 記事下の点線 */
        article::after { 
            content: ""; position: absolute; bottom: -15px; right: 0; width: 100%; 
            border-bottom: 1px dotted #bbb; 
        }

        .meta { font-size: 1.1rem; color: #777; margin-bottom: 8px; font-family: sans-serif; }

        h2 { 
            font-size: 3.0rem; line-height: 1.25; margin: 0 0 15px 0; font-weight: 800; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent); /* 見出しに微かな影 */
            padding: 10px 5px; 
            border-right: 3px solid #a00; /* 見出しの横にアクセントの赤い縦線 */
        }

        .content { 
            font-size: 2.0rem;
            line-height: 1.7;
            text-align: justify;

            /* ▼▼▼ スマホでのバグ修正のための追加 ▼▼▼ */
        writing-mode: vertical-rl; /* ここでも縦書きを明示 */
        text-combine-upright: none; /* 縦中横を無効化 */
        -webkit-text-orientation: mixed; /* 文字の向きを安定させる */
        text-orientation: mixed;
        /* ▲▲▲ ここまで ▲▲▲ */
            
            overflow: hidden;
            
            display: -webkit-box;
            -webkit-line-clamp: 24;
            -webkit-box-orient: vertical; 
        }
        
        a.article-link { text-decoration: none; color: inherit; display: block; height: 100%; transition: 0.3s; }
        a:hover { background-color: rgba(255,255,255,0.4); opacity: 0.8; }

    </style>
</head>
<body>

<nav>
    <div class="brand">電脳新聞</div>
    <div class="menu">
        <a href="/?cat=top" class="{% if current_cat == 'top' %}active{% endif %}">トップ</a>
        <a href="/?cat=japan" class="{% if current_cat == 'japan' %}active{% endif %}">日本</a>
        <a href="/?cat=world" class="{% if current_cat == 'world' %}active{% endif %}">世界</a>
        <a href="/?cat=business" class="{% if current_cat == 'business' %}active{% endif %}">ビジネス</a>
        <a href="/?cat=technology" class="{% if current_cat == 'technology' %}active{% endif %}">科学技術</a>
        <a href="/?cat=entertainment" class="{% if current_cat == 'entertainment' %}active{% endif %}">エンタメ</a>
        <a href="/?cat=sports" class="{% if current_cat == 'sports' %}active{% endif %}">スポーツ</a>
        <a href="/?cat=science" class="{% if current_cat == 'science' %}active{% endif %}">科学</a>
    </div>
</nav>

<main>
    {% for entry in entries %}
    <article>
        <a href="{{ entry.link }}" target="_blank" class="article-link">
            <div class="meta">{{ entry.published }}</div>
            <h2>{{ entry.title }}</h2>
            <div class="content">
                {{ entry.content | safe }}
            </div>
        </a>
    </article>
    {% endfor %}
</main>

</body>
</html>
