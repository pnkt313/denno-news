<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電脳新聞 縦書き電子版</title>
    <style>
        /* ==========================================================
           1. 全体設定（PC版：50%縮小 & 縦書き）
           ========================================================== */
        html { font-size: 50%; }
        body { 
            background-color: #f0ede4; 
            color: #222; 
            font-family: "Yu Mincho", "MS PMincho", serif; 
            margin: 0; 
            padding: 0; 
            writing-mode: vertical-rl; 
            height: 100vh; 
            display: flex;
            flex-direction: row; 
        }

        /* ヘッダー・タブメニュー（横書き固定） */
        nav {
            writing-mode: horizontal-tb; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        nav .brand {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.2rem;
            margin-right: 30px;
        }

        nav .menu {
            display: flex;
            justify-content: center;
            gap: 1px;
            flex-grow: 1;
        }

        nav .menu a {
            text-decoration: none;
            color: #eee;
            font-size: 1.6rem;
            padding: 12px 20px;
            background-color: #444;
            transition: 0.2s;
            font-family: sans-serif;
        }

        nav .menu a.active { background-color: #a00; color: #fff; font-weight: bold; }

        /* ==========================================================
           2. 紙面レイアウト（PC版：2段×3列）
           ========================================================== */
        main { 
            display: grid; 
            grid-template-rows: repeat(2, 1fr); /* 2段に設定 */
            grid-auto-flow: column; 
            gap: 35px; 
            padding: 80px 30px 30px 30px; 
            height: 100vh; 
            box-sizing: border-box;
            overflow-x: auto;
            border-right: 1px solid #ccc;
        }
        
        article { 
            height: 420px; /* 1行の長さ */
            width: auto; 
            min-width: 300px; 
            border-left: 1px solid #999; 
            padding-left: 20px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        article::after { 
            content: ""; 
            position: absolute; 
            bottom: -15px; 
            right: 0; 
            width: 100%; 
            border-bottom: 1px dotted #bbb; 
        }

        .meta { font-size: 1.1rem; color: #777; margin-bottom: 8px; font-family: sans-serif; }

        h2 { 
            font-size: 3.0rem; 
            line-height: 1.25; 
            margin: 0 0 15px 0; 
            font-weight: 800; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent); 
            padding: 10px 5px; 
            border-right: 3px solid #a00; 
        }

.content { 
    font-size: 2.0rem; 
    line-height: 1.7; 
    text-align: justify; 
    overflow: hidden; 
    display: -webkit-box; 
    -webkit-line-clamp: 24; 
    -webkit-box-orient: vertical; 

    /* --- ↓↓↓ ここから強力なバグ対策を追加 ↓↓↓ --- */
    writing-mode: vertical-rl !important; /* 強制的に縦書き */
    -webkit-writing-mode: vertical-rl !important; /* Safari用 */
    
    text-orientation: mixed !important; /* 文字の向きを安定させる */
    -webkit-text-orientation: mixed !important;
    
    text-combine-upright: none !important; /* 縦中横を無効化 */
}
        
        a.article-link { text-decoration: none; color: inherit; display: block; height: 100%; transition: 0.3s; }
        a:hover { background-color: rgba(255,255,255,0.4); }

        /* ==========================================================
           3. スマホ用設定（画面幅768px以下：1x6 垂直並び）
           ========================================================== */
        @media (max-width: 768px) {
            body {
                writing-mode: horizontal-tb; /* 全体は上下スワイプ用に横書きモードへ */
                height: auto;
                overflow-y: auto;
                overflow-x: hidden;
                display: block;
            }

            main {
                display: flex;
                flex-direction: column; /* 記事を縦に並べる */
                padding: 70px 15px 20px 15px;
                height: auto;
                gap: 50px;
            }

            article {
/* ▼▼▼ スマホブラウザへの強力な指示を追加 ▼▼▼ */
        writing-mode: vertical-rl !important; 
        -webkit-writing-mode: vertical-rl !important;
        
        display: block !important; /* Flexを解除して安定させる */
        /* ▲▲▲ ここまで ▲▲▲ */
                height: 450px; /* スマホでの1行の長さ */
                width: 100%;
                min-width: 0;
                overflow-x: auto; /* 長い記事は横スクロール可能に */
                overflow-y: hidden;
                border-left: none;
                border-right: 3px solid #a00;
                padding: 0 15px 0 0;
                margin: 0;
                background: rgba(255,255,255,0.2);
            }

            h2 { font-size: 2.6rem; }
            .content { font-size: 1.8rem; -webkit-line-clamp: 15; }

            article::after {
                bottom: -25px;
                border-bottom: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="brand">電脳新聞</div>
    <div class="menu">
        <a href="/?cat=top" class="{% if current_cat == 'top' %}active{% endif %}">トップ</a>
        <a href="/?cat=japan" class="{% if current_cat == 'japan' %}active{% endif %}">日本</a>
        <a href="/?cat=world" class="{% if current_cat == 'world' %}active{% endif %}">世界</a>
        <a href="/?cat=business" class="{% if current_cat == 'business' %}active{% endif %}">ビジネス</a>
        <a href="/?cat=technology" class="{% if current_cat == 'technology' %}active{% endif %}">科学技術</a>
        <a href="/?cat=entertainment" class="{% if current_cat == 'entertainment' %}active{% endif %}">エンタメ</a>
        <a href="/?cat=sports" class="{% if current_cat == 'sports' %}active{% endif %}">スポーツ</a>
        <a href="/?cat=science" class="{% if current_cat == 'science' %}active{% endif %}">科学</a>
    </div>
</nav>

<main>
    {% for entry in entries %}
    <article>
        <a href="{{ entry.link }}" target="_blank" class="article-link">
            <div class="meta">{{ entry.published }}</div>
            <h2>{{ entry.title }}</h2>
            <div class="content">
                {{ entry.content | safe }}
            </div>
        </a>
    </article>
    {% endfor %}
</main>

</body>
</html>
